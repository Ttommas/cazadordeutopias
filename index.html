<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cazador de Utopías</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #000000;
    --paper: #ffffff;
    --hairline: 1px solid var(--ink);
    --font: "Comic Sans MS", "Comic Neue", cursive;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
  }

  /* ---------- cabecera tipo grilla suiza ---------- */
  header {
    border-bottom: 3px solid var(--ink);
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    padding: 20px 24px 14px;
    gap: 16px;
  }
  header h1 {
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    line-height: 0.95;
  }
  .meta {
    text-align: right;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    line-height: 1.6;
  }

  /* ---------- cuerpo ---------- */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 180px 1fr;
    min-height: 0;
  }

  /* columna del medidor */
  .gauge-col {
    border-right: var(--hairline);
    display: flex;
    padding: 24px;
    gap: 12px;
  }

  .scale {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 10px;
    font-weight: 700;
    text-align: right;
  }

  .tube {
    position: relative;
    flex: 1;
    border: 2px solid var(--ink);
    overflow: hidden;
    background:
      repeating-linear-gradient(
        to top,
        transparent 0,
        transparent calc(10% - 1px),
        var(--ink) calc(10% - 1px),
        var(--ink) 10%
      );
    background-size: 100% 100%;
  }

  .fill {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 0%;
    background: var(--ink);
    transition: height 1.8s cubic-bezier(.6, 0, .2, 1);
  }

  /* columna de contenido */
  .content {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .reading-row {
    border-bottom: var(--hairline);
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 20px 24px;
  }

  .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-weight: 700;
  }

  .number {
    font-size: clamp(4rem, 14vw, 9rem);
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .number small {
    font-size: 0.3em;
    font-weight: 400;
  }

  .quote-block {
    flex: 1;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    justify-content: center;
  }
  .quote {
    font-size: clamp(1.1rem, 2.6vw, 1.7rem);
    font-weight: 700;
    line-height: 1.35;
    max-width: 32ch;
    min-height: 3em;
  }
  .attribution {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }

  .action-row {
    border-top: 3px solid var(--ink);
    display: grid;
    grid-template-columns: 1fr auto;
  }

  button {
    font-family: var(--font);
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 22px;
    cursor: pointer;
  }
  button:hover { background: var(--paper); color: var(--ink); box-shadow: inset 0 0 0 3px var(--ink); }
  button:active { letter-spacing: 0.5em; }
  button:focus-visible { outline: 3px dashed var(--ink); outline-offset: -8px; }
  button:disabled { opacity: 0.4; cursor: wait; }

  .counter-box {
    border-left: var(--hairline);
    padding: 12px 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    line-height: 1.7;
  }
  .counter-box b { font-size: 16px; }

  footer {
    border-top: var(--hairline);
    padding: 8px 24px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    display: flex;
    justify-content: space-between;
  }

  @media (max-width: 560px) {
    main { grid-template-columns: 110px 1fr; }
    .gauge-col { padding: 14px; }
    .reading-row, .quote-block { padding: 16px; }
    .quote { font-size: 1rem; }
    .counter-box { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .fill { transition: height 0.2s linear; }
  }
</style>
</head>
<body>

<header>
  <h1>Cazador<br>de utopías</h1>
  <div class="meta">
    Medición diaria<br>
    Escala 01–100<br>
    <span id="date"></span>
  </div>
</header>

<main>
  <div class="gauge-col">
    <div class="scale">
      <span>100</span><span>90</span><span>80</span><span>70</span><span>60</span>
      <span>50</span><span>40</span><span>30</span><span>20</span><span>10</span><span>0</span>
    </div>
    <div class="tube">
      <div class="fill" id="fill"></div>
    </div>
  </div>

  <div class="content">
    <div class="reading-row">
      <span class="label">Utopía del día</span>
      <span class="number"><span id="number">00</span><small>%</small></span>
    </div>

    <div class="quote-block">
      <p class="quote" id="quote">Apretá el botón. La utopía no se caza sola.</p>
      <p class="attribution" id="attribution">— Sistema</p>
    </div>

    <div class="action-row">
      <button id="btn" onclick="cazar()">Cazar</button>
      <div class="counter-box">
        Cacerías<br>
        <b id="count">0</b>
      </div>
    </div>
  </div>
</main>

<footer>
  <span>Cazador de utopías v2.0</span>
  <span>Blanco / Negro / Comic Sans</span>
</footer>

<script>
  const hoy = new Date();
  document.getElementById('date').textContent =
    hoy.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });

  const fill = document.getElementById('fill');
  const number = document.getElementById('number');
  const quote = document.getElementById('quote');
  const attribution = document.getElementById('attribution');
  const btn = document.getElementById('btn');
  const countEl = document.getElementById('count');
  let cacerias = 0;

  // Frases reales de Gustavo Alfaro, por rango de utopía
  function frase(v) {
    if (v <= 20) return '“Éramos Bruce Willis en Sexto Sentido: nos daban por muertos.”';
    if (v <= 40) return '“Es más fácil desactivar un átomo que un preconcepto.”';
    if (v <= 60) return '“Somos un poco Dr. Jekyll y Mr. Hyde.”';
    if (v <= 80) return '“Cuando veas la sombra de un gigante, no te asustes.”';
    return '“Fueron cazadores de utopías imposibles.”';
  }

  function cazar() {
    const objetivo = Math.floor(Math.random() * 100) + 1; // 1 a 100
    btn.disabled = true;
    cacerias++;
    countEl.textContent = cacerias;

    quote.style.opacity = 0.15;
    attribution.style.opacity = 0.15;

    fill.style.height = objetivo + '%';

    const inicio = parseInt(number.textContent, 10) || 0;
    const dur = 1700;
    const t0 = performance.now();
    function paso(t) {
      const p = Math.min((t - t0) / dur, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      const val = Math.round(inicio + (objetivo - inicio) * ease);
      number.textContent = String(val).padStart(2, '0');
      if (p < 1) requestAnimationFrame(paso);
      else {
        quote.textContent = frase(objetivo);
        attribution.textContent = '— Gustavo Alfaro, DT';
        quote.style.opacity = 1;
        attribution.style.opacity = 1;
        btn.disabled = false;
      }
    }
    requestAnimationFrame(paso);
  }
</script>

</body>
</html>
